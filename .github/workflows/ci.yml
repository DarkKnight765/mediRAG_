name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install System Dependencies for Canvas (Backend)
        if: matrix.service == 'backend'
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build backend smoke check
        if: matrix.service == 'backend'
        env:
          GEMINI_API_KEY: dummy-key
          PORT: 3001
          RUNTIME_MODEL_MODE: mock
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: node -e "require('./src/app'); console.log('backend app loaded')"

      - name: Run backend integration tests
        if: matrix.service == 'backend'
        env:
          GEMINI_API_KEY: dummy-key
          PORT: 3001
          RUNTIME_MODEL_MODE: mock
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: |
          nohup npm run mock-model > mock.log 2>&1 &
          sleep 1
          npm run test:unit
          npm run test:integration

      - name: Build frontend
        if: matrix.service == 'frontend'
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:8080/api
        run: npm run build
