version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOCAL_MODEL_URL=http://mock-model:8000
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    expose:
      - "3001"
    depends_on:
      - mock-model

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  mock-model:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run mock-model
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODEL_PORT=8000

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=medirag
      - POSTGRES_PASSWORD=medirag
      - POSTGRES_DB=medirag
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      - DATABASE_URL=postgres://medirag:medirag@postgres:5432/medirag
    ports:
      - "6432:6432"
    depends_on:
      - postgres

volumes:
  uploads:
